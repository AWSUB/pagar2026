name: Sync Fork with Upstream
on:
  schedule:
    - cron: "0 * * * *" # Runs every 1 hour
  workflow_dispatch: # Allows manual triggering

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Forked Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add Upstream Remote
        run: git remote add upstream https://github.com/jasmineeer/pagar2026.git

      - name: Fetch Upstream Changes
        run: git fetch upstream

      - name: Merge Changes and Push
        run: |
          git checkout main
          git reset --hard upstream/main
          git checkout origin/main -- .github/ Dockerfile docker-compose-production.yaml .dockerignore
          git add .
          git commit -m "restore deployment file"
          git push origin main --force-with-lease
