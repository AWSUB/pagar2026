version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: pagar_base
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: pagar_db
      MYSQL_USER: admin_pagar
      MYSQL_PASSWORD: pagar2026
    ports:
      - "3307:3306"                         
    volumes:
      - pagar_db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: pagar_phpmyadmin
    restart: always
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "8081:80"                           
    depends_on:
      - db

volumes:
  pagar_db_data: